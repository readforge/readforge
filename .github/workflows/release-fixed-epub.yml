name: Build Fixed EPUB Reader Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: readforge-fixed-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      RELEASE_VERSION: 1.7.21

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Set release version
        shell: pwsh
        run: |
          $pkgPath = "package.json"
          $pkg = Get-Content -Raw -Path $pkgPath | ConvertFrom-Json
          $pkg.version = $env:RELEASE_VERSION
          $pkg | ConvertTo-Json -Depth 20 | Set-Content -Path $pkgPath -NoNewline
          "VERSION=$env:RELEASE_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "ReadForge release version: $env:RELEASE_VERSION"

      - name: Apply fixed EPUB reader patches
        run: node scripts/patch-readforge-release.js

      - name: Build Windows app
        shell: pwsh
        run: |
          npm run dist -- --publish never

      - name: Verify release files
        shell: pwsh
        run: |
          if (-not (Test-Path "release/latest.yml")) { throw "Missing latest.yml" }
          if (-not (Get-ChildItem -Path "release" -Filter "*.exe" -File)) { throw "Missing installer exe" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReadForge-Windows-${{ env.RELEASE_VERSION }}
          path: |
            release/latest.yml
            release/*.exe
            release/*.blockmap

      - name: Publish fixed GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: ReadForge v${{ env.RELEASE_VERSION }}
          body: Automatic fixed ReadForge release.
          make_latest: true
          files: |
            release/latest.yml
            release/*.exe
            release/*.blockmap
