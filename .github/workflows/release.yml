name: Build and Publish ReadForge Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Read package version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "ReadForge version: $version"

      - name: Apply updater reliability patch
        shell: pwsh
        run: |
          $file = "electron/main.cjs"
          $text = Get-Content -Raw -Path $file
          $text = $text.Replace("autoInstallAfterDownload = Boolean(payload?.autoInstall)", "autoInstallAfterDownload = payload?.autoInstall !== false")
          $text = $text.Replace("autoUpdater.autoDownload = false", "autoUpdater.autoDownload = true")
          $text = $text.Replace("app.whenReady().then(() => { ensureDataDirs(); createWindow();", "app.whenReady().then(() => { ensureDataDirs(); setupAutoUpdater(); createWindow();")
          Set-Content -Path $file -Value $text -NoNewline

      - name: Build Windows app
        run: npm run dist -- --publish never

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$env:VERSION"
          Write-Host "Publishing $tag"
          gh release delete $tag --yes --cleanup-tag 2>$null
          $assets = Get-ChildItem -Path "release" -File | ForEach-Object { $_.FullName }
          if (-not $assets -or $assets.Count -eq 0) {
            throw "No release asset files were found in the release folder."
          }
          Write-Host "Assets to upload:"
          $assets | ForEach-Object { Write-Host $_ }
          gh release create $tag $assets --title "ReadForge $tag" --notes "Automated ReadForge release $tag" --latest
