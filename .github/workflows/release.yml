name: Build and Publish ReadForge Release

on:
  workflow_dispatch:

concurrency:
  group: readforge-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      RELEASE_VERSION: 1.7.16

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Set release version
        shell: pwsh
        run: |
          $pkgPath = "package.json"
          $pkg = Get-Content -Raw -Path $pkgPath | ConvertFrom-Json
          $pkg.version = $env:RELEASE_VERSION
          $pkg | ConvertTo-Json -Depth 20 | Set-Content -Path $pkgPath -NoNewline
          "VERSION=$env:RELEASE_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "ReadForge release version: $env:RELEASE_VERSION"

      - name: Apply app reliability patch
        shell: pwsh
        run: |
          $file = "electron/main.cjs"
          $text = Get-Content -Raw -Path $file
          $text = $text.Replace("autoInstallAfterDownload = Boolean(payload?.autoInstall)", "autoInstallAfterDownload = payload?.autoInstall !== false")
          $text = $text.Replace("autoUpdater.autoDownload = false", "autoUpdater.autoDownload = true")
          $text = $text.Replace("app.whenReady().then(() => { ensureDataDirs(); createWindow();", "app.whenReady().then(() => { ensureDataDirs(); setupAutoUpdater(); createWindow();")
          Set-Content -Path $file -Value $text -NoNewline

          $htmlFile = "index.html"
          $html = Get-Content -Raw -Path $htmlFile
          $html = $html -replace "ReadForge v[0-9]+\.[0-9]+\.[0-9]+", "ReadForge v$env:VERSION"
          Set-Content -Path $htmlFile -Value $html -NoNewline

          $jsxFile = "src/main.jsx"
          $jsx = Get-Content -Raw -Path $jsxFile
          $jsx = $jsx.Replace("function zipFile(zip, p) { const n = normalizeZipPath(p); return zip.file(n) || zip.file(decodeURIComponent(n)) || zip.file(n.replace(/%20/g, ' ')) }", "function zipFile(zip, p) { const n = normalizeZipPath(p); return zip.file(n) || zip.file(decodeURIComponent(n)) || zip.file(n.replace(/%20/g, ' ')) }`nfunction mimeFromPath(p) { const ext=String(p||'').split('?')[0].split('.').pop().toLowerCase(); return ({jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',svg:'image/svg+xml',bmp:'image/bmp'})[ext] || 'application/octet-stream' }`nasync function inlineEpubImages(doc, zip, chapterPath) { const base=String(chapterPath||'').split('/').slice(0,-1).join('/'); for (const img of [...doc.querySelectorAll('img')]) { const src=img.getAttribute('src')||''; if(!src || /^(data:|https?:|blob:)/i.test(src)) continue; const f=zipFile(zip, joinZipPath(base, src)); if(f) img.setAttribute('src', 'data:'+mimeFromPath(src)+';base64,'+await f.async('base64')); } }")
          $jsx = $jsx.Replace("function extractChapter(html, fallbackTitle) {", "async function extractChapter(html, fallbackTitle, zip, chapterPath) {")
          $jsx = $jsx.Replace("sanitize(doc)`n  const body", "sanitize(doc)`n  if (zip) await inlineEpubImages(doc, zip, chapterPath)`n  const body")
          $jsx = $jsx.Replace("const els = [...body.querySelectorAll('h1,h2,h3,h4,h5,h6,p,li,blockquote,pre')]", "const els = [...body.querySelectorAll('h1,h2,h3,h4,h5,h6,p,li,blockquote,pre,figure,img')]")
          $jsx = $jsx.Replace("const ch = extractChapter(await f.async('text'), fallback)", "const ch = await extractChapter(await f.async('text'), fallback, zip, item.fullPath)")
          $jsx = $jsx.Replace("textAlign: 'left', readingMode: 'scroll', paragraphsPerPage: 6, displayMode: 'clean'", "textAlign: 'left', readingMode: 'scroll', paragraphsPerPage: 6, displayMode: 'original'")
          $jsx = $jsx.Replace("const moveChapter=i=>{stopReading(); setChapterIndex(clamp(i,0,bookData.chapters.length-1)); setPageIndex(0); setCurrentParagraph(0); setActiveParagraph(null); setActiveWord(null)}", "const moveChapter=i=>{stopReading(); setChapterIndex(clamp(i,0,bookData.chapters.length-1)); setPageIndex(0); setCurrentParagraph(0); setActiveParagraph(null); setActiveWord(null); setTimeout(()=>{document.querySelector('.reader-stage')?.scrollTo({top:0,behavior:'smooth'}); document.querySelector('.book-page')?.scrollIntoView({block:'start',behavior:'smooth'})},80)}")
          Set-Content -Path $jsxFile -Value $jsx -NoNewline

      - name: Build Windows app
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Build attempt $attempt of $maxAttempts"
            npm run dist -- --publish never
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Build succeeded."
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              $delay = 20 * $attempt
              Write-Host "Build failed, waiting $delay seconds and trying again..."
              Start-Sleep -Seconds $delay
            }
          }
          throw "Windows build failed after $maxAttempts attempts."

      - name: Verify release files
        shell: pwsh
        run: |
          Get-ChildItem -Path "release" -File | ForEach-Object { Write-Host "Asset: $($_.Name)" }
          if (-not (Test-Path "release/latest.yml")) { throw "Missing latest.yml" }
          if (-not (Get-ChildItem -Path "release" -Filter "*.exe" -File)) { throw "Missing installer exe" }

      - name: Publish clean GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$env:VERSION"
          Write-Host "Publishing clean release $tag"
          gh release delete $tag --yes --cleanup-tag 2>$null
          git tag -d $tag 2>$null
          git push origin ":refs/tags/$tag" 2>$null
          gh release create $tag --target "$env:GITHUB_SHA" --title "ReadForge $tag" --notes "Automated ReadForge release $tag" --latest
          gh release upload $tag "release/latest.yml" --clobber
          $installer = Get-ChildItem -Path "release" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $installer) { throw "Missing installer exe" }
          gh release upload $tag $installer.FullName --clobber
          $blockmap = Get-ChildItem -Path "release" -Filter "*.blockmap" -File | Select-Object -First 1
          if ($blockmap) { gh release upload $tag $blockmap.FullName --clobber }
