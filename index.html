<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ReadForge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      #readforge-version-badge {
        position: fixed;
        right: 14px;
        bottom: 10px;
        z-index: 99999;
        display: none;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.56);
        color: rgba(255, 255, 255, 0.86);
        font-family: Segoe UI, Arial, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(10px);
        pointer-events: none;
      }
      .book-card, .book-row { position: relative; }
      .readforge-delete-book-button {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 20;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 999px;
        background: rgba(96, 22, 22, .82);
        color: white;
        font-family: Segoe UI, Arial, sans-serif;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
        opacity: 0;
        transition: opacity .15s ease, transform .15s ease, background .15s ease;
        transform: translateY(-2px);
      }
      .book-card:hover .readforge-delete-book-button,
      .book-row:hover .readforge-delete-book-button,
      .readforge-delete-book-button:focus {
        opacity: 1;
        transform: translateY(0);
      }
      .readforge-delete-book-button:hover { background: rgba(180, 42, 42, .95); }
      .readforge-one-click-note {
        margin-top: 10px;
        font-size: 12px;
        opacity: .8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="readforge-version-badge">ReadForge v1.7.13</div>
    <script>
      (function () {
        function cleanSpeechText(value) {
          return String(value || '')
            .replace(/\u00e2(?:\u20ac|\u0080)(?:\u2122|\u0099)/g, "'")
            .replace(/\u00e2(?:\u20ac|\u0080)(?:\u02dc|\u0098)/g, "'")
            .replace(/\u00e2(?:\u20ac|\u0080)(?:\u0153|\u009c)/g, '"')
            .replace(/\u00e2(?:\u20ac|\u0080)(?:\u009d)/g, '"')
            .replace(/\u00e2(?:\u20ac|\u0080)(?:\u00a6)/g, '...')
            .replace(/\u00e2(?:\u20ac|\u0080)(?:\u201c|\u0093|\u201d|\u0094)/g, '-')
            .replace(/\u20ac(?:\u2122|\u0099)/g, "'")
            .replace(/\u20ac(?:\u0153|\u009c|\u009d)/g, '"')
            .replace(/\u20ac\u00a6/g, '...')
            .replace(/\u20ac(?:\u201c|\u201d|\u0093|\u0094)/g, '-')
            .replace(/\u00e2\u20ac\u00a2/g, ' ')
            .replace(/[\u00e2\u20ac\u2122\u00c2]/g, '')
            .replace(/[\u0000-\u0008\u000b\u000c\u000e-\u001f\u007f-\u009f]/g, '')
            .replace(/\uFFFD/g, '')
            .replace(/[•·▪▫■□◆◇●○▲▼►◄]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
        }

        if (window.SpeechSynthesisUtterance) {
          var OriginalUtterance = window.SpeechSynthesisUtterance;
          window.SpeechSynthesisUtterance = function (text) {
            return new OriginalUtterance(cleanSpeechText(text));
          };
          window.SpeechSynthesisUtterance.prototype = OriginalUtterance.prototype;
        }

        if (window.speechSynthesis) {
          var originalSpeak = window.speechSynthesis.speak.bind(window.speechSynthesis);
          var originalCancel = window.speechSynthesis.cancel.bind(window.speechSynthesis);
          var lastBoundaryIndex = 0;
          window.speechSynthesis.cancel = function () { lastBoundaryIndex = 0; return originalCancel(); };
          window.speechSynthesis.speak = function (utterance) {
            lastBoundaryIndex = 0;
            var originalBoundary = utterance.onboundary;
            if (typeof originalBoundary === 'function') {
              utterance.onboundary = function (event) {
                if (typeof event.charIndex === 'number') {
                  if (event.charIndex < lastBoundaryIndex) return;
                  lastBoundaryIndex = event.charIndex;
                }
                originalBoundary.call(utterance, event);
              };
            }
            var oldEnd = utterance.onend;
            var oldError = utterance.onerror;
            utterance.onend = function (event) { lastBoundaryIndex = 0; if (typeof oldEnd === 'function') oldEnd.call(utterance, event); };
            utterance.onerror = function (event) { lastBoundaryIndex = 0; if (typeof oldError === 'function') oldError.call(utterance, event); };
            return originalSpeak(utterance);
          };
        }

        function patchReadForgeBridge() {
          if (!window.readforge) return;
          if (!window.readforge.__cleanSpeechPatched && typeof window.readforge.synthesizeWindowsNaturalSpeech === 'function') {
            var originalNatural = window.readforge.synthesizeWindowsNaturalSpeech;
            window.readforge.synthesizeWindowsNaturalSpeech = function (payload) {
              return originalNatural(Object.assign({}, payload || {}, { text: cleanSpeechText((payload || {}).text) }));
            };
            window.readforge.__cleanSpeechPatched = true;
          }
          if (!window.readforge.__oneClickUpdaterPatched && typeof window.readforge.checkForUpdates === 'function') {
            var originalCheck = window.readforge.checkForUpdates;
            window.readforge.checkForUpdates = function (payload) {
              return originalCheck(Object.assign({}, payload || {}, {
                provider: 'github',
                owner: 'readforge',
                repo: 'readforge',
                autoInstall: true
              }));
            };
            window.readforge.__oneClickUpdaterPatched = true;
          }
        }

        window.addEventListener('DOMContentLoaded', function () {
          var badge = document.getElementById('readforge-version-badge');
          var originalAlert = window.alert;
          window.alert = function (message) {
            var text = String(message || '');
            if (/HD voice|Natural voice|Windows voice/i.test(text)) return;
            return originalAlert.call(window, message);
          };
          patchReadForgeBridge();
          setInterval(patchReadForgeBridge, 1000);

          function updateVersionBadgeVisibility() {
            if (!badge) return;
            var onLibrary = !!document.querySelector('.library-screen');
            var inReader = !!document.querySelector('.reader-screen');
            badge.style.display = onLibrary && !inReader ? 'block' : 'none';
          }

          function relabelVoiceUi() {
            Array.from(document.querySelectorAll('option')).forEach(function (opt) {
              if ((opt.textContent || '').includes('Windows Natural voices - Andrew HD')) opt.textContent = 'Windows voices detected by ReadForge';
            });
            Array.from(document.querySelectorAll('button')).forEach(function (btn) {
              if ((btn.textContent || '').includes('Refresh Windows Natural voices')) btn.textContent = 'Refresh Windows voices';
            });
            Array.from(document.querySelectorAll('p.hint')).forEach(function (hint) {
              if ((hint.textContent || '').includes('Microsoft Andrew Natural HD')) {
                hint.textContent = 'ReadForge can only use voices Windows exposes to desktop apps. If Andrew HD is not shown in the Windows voice list, choose one of the listed voices instead.';
              }
            });
          }

          function patchUpdateButtons() {
            var panel = document.querySelector('.update-center');
            if (!panel) return;
            var buttons = Array.from(panel.querySelectorAll('button'));
            buttons.forEach(function (button) {
              var text = (button.textContent || '').trim();
              if (text === 'Check for updates') {
                button.textContent = 'Check for updates and install';
                button.classList.add('full');
                button.title = 'Checks GitHub, downloads the update, then restarts ReadForge to install it.';
              }
              if (text === 'Download update' || text === 'Restart and install downloaded update') {
                button.style.display = 'none';
              }
            });
            var card = Array.from(panel.querySelectorAll('.update-card')).find(function (c) { return (c.textContent || '').includes('Check/install'); });
            if (card && !card.querySelector('.readforge-one-click-note')) {
              var note = document.createElement('p');
              note.className = 'readforge-one-click-note';
              note.textContent = 'One-button update is enabled: check, download, and restart/install happen from the main button when a newer release exists.';
              card.appendChild(note);
            }
          }

          function addDeleteButtons() {
            if (!window.readforge || !window.readforge.getLibrary || !window.readforge.saveLibrary) return;
            var cards = Array.from(document.querySelectorAll('.book-card, .book-row'));
            cards.forEach(function (card, index) {
              if (card.querySelector('.readforge-delete-book-button')) return;
              var title = (card.querySelector('h3') || {}).textContent || 'this book';
              var button = document.createElement('button');
              button.type = 'button';
              button.className = 'readforge-delete-book-button';
              button.textContent = '🗑';
              button.setAttribute('aria-label', 'Remove this book from your library');
              button.title = 'Remove this book from your library';
              button.addEventListener('click', async function (event) {
                event.preventDefault();
                event.stopPropagation();
                if (!confirm('Remove "' + title + '" from your ReadForge library?')) return;
                var library = await window.readforge.getLibrary();
                var books = library.books || [];
                var matchingTitle = String(title || '').trim().toLowerCase();
                var match = books.find(function (b) { return String(b.title || 'Untitled').trim().toLowerCase() === matchingTitle; }) || books[index];
                if (!match) return;
                var next = Object.assign({}, library, { books: books.filter(function (b) { return b.id !== match.id; }) });
                await window.readforge.saveLibrary(next);
                location.reload();
              });
              card.appendChild(button);
            });
          }

          function refreshHelpers() {
            updateVersionBadgeVisibility();
            relabelVoiceUi();
            patchUpdateButtons();
            addDeleteButtons();
          }
          refreshHelpers();
          new MutationObserver(refreshHelpers).observe(document.body, { childList: true, subtree: true, attributes: true });
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
