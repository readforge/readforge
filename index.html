<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ReadForge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      #readforge-version-badge {
        position: fixed;
        right: 14px;
        bottom: 10px;
        z-index: 99999;
        display: none;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.56);
        color: rgba(255, 255, 255, 0.86);
        font-family: Segoe UI, Arial, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(10px);
        pointer-events: none;
      }
      .book-card, .book-row { position: relative; }
      .readforge-delete-book-button {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 20;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 999px;
        background: rgba(96, 22, 22, .82);
        color: white;
        font-family: Segoe UI, Arial, sans-serif;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
        opacity: 0;
        transition: opacity .15s ease, transform .15s ease, background .15s ease;
        transform: translateY(-2px);
      }
      .book-card:hover .readforge-delete-book-button,
      .book-row:hover .readforge-delete-book-button,
      .readforge-delete-book-button:focus {
        opacity: 1;
        transform: translateY(0);
      }
      .readforge-delete-book-button:hover { background: rgba(180, 42, 42, .95); }
      .readforge-one-click-note { margin-top: 10px; font-size: 12px; opacity: .8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="readforge-version-badge">ReadForge v1.7.14</div>
    <script>
      (function () {
        function hideVoiceWindowsUi() {
          Array.from(document.querySelectorAll('option')).forEach(function (opt) {
            var text = opt.textContent || '';
            if (opt.value === 'browser' || text.indexOf('Browser/Chromium voices') >= 0) opt.textContent = 'Voice Styles';
            if (opt.value === 'windowsNatural' || text.indexOf('Windows Natural') >= 0 || text.indexOf('Windows voices detected') >= 0) opt.remove();
          });
          Array.from(document.querySelectorAll('label.setting-row')).forEach(function (label) {
            var span = label.querySelector('span');
            var select = label.querySelector('select');
            var labelText = (span && span.textContent || '').trim();
            if (labelText === 'Voice engine') {
              if (select && select.value !== 'browser') {
                select.value = 'browser';
                select.dispatchEvent(new Event('change', { bubbles: true }));
              }
              label.style.display = 'none';
            }
            if (labelText === 'Voice') span.textContent = 'Voice Styles';
            if ((label.textContent || '').indexOf('Windows voice') >= 0) label.style.display = 'none';
          });
          Array.from(document.querySelectorAll('button')).forEach(function (btn) {
            var text = btn.textContent || '';
            if (text.indexOf('Refresh Windows') >= 0 || text.indexOf('Windows Natural') >= 0) btn.style.display = 'none';
          });
          Array.from(document.querySelectorAll('p.hint')).forEach(function (hint) {
            var text = hint.textContent || '';
            if (text.indexOf('Andrew') >= 0 || text.indexOf('Windows exposes') >= 0 || text.indexOf('Windows voice') >= 0) hint.style.display = 'none';
          });
        }

        function patchReadForgeBridge() {
          if (!window.readforge) return;
          if (!window.readforge.__oneClickUpdaterPatched && typeof window.readforge.checkForUpdates === 'function') {
            var originalCheck = window.readforge.checkForUpdates;
            window.readforge.checkForUpdates = function (payload) {
              return originalCheck(Object.assign({}, payload || {}, {
                provider: 'github',
                owner: 'readforge',
                repo: 'readforge',
                autoInstall: true
              }));
            };
            window.readforge.__oneClickUpdaterPatched = true;
          }
        }

        window.addEventListener('DOMContentLoaded', function () {
          var badge = document.getElementById('readforge-version-badge');
          var originalAlert = window.alert;
          window.alert = function (message) {
            var text = String(message || '');
            if (/HD voice|Natural voice|Windows voice/i.test(text)) return;
            return originalAlert.call(window, message);
          };
          patchReadForgeBridge();
          setInterval(patchReadForgeBridge, 1000);

          function updateVersionBadgeVisibility() {
            if (!badge) return;
            var onLibrary = !!document.querySelector('.library-screen');
            var inReader = !!document.querySelector('.reader-screen');
            badge.style.display = onLibrary && !inReader ? 'block' : 'none';
          }

          function patchUpdateButtons() {
            var panel = document.querySelector('.update-center');
            if (!panel) return;
            Array.from(panel.querySelectorAll('button')).forEach(function (button) {
              var text = (button.textContent || '').trim();
              if (text === 'Check for updates') {
                button.textContent = 'Check for updates and install';
                button.classList.add('full');
                button.title = 'Checks GitHub, downloads the update, then restarts ReadForge to install it.';
              }
              if (text === 'Download update' || text === 'Restart and install downloaded update') button.style.display = 'none';
            });
            var card = Array.from(panel.querySelectorAll('.update-card')).find(function (c) { return (c.textContent || '').indexOf('Check/install') >= 0; });
            if (card && !card.querySelector('.readforge-one-click-note')) {
              var note = document.createElement('p');
              note.className = 'readforge-one-click-note';
              note.textContent = 'One-button update is enabled: check, download, and restart/install happen from the main button when a newer release exists.';
              card.appendChild(note);
            }
          }

          function addDeleteButtons() {
            if (!window.readforge || !window.readforge.getLibrary || !window.readforge.saveLibrary) return;
            Array.from(document.querySelectorAll('.book-card, .book-row')).forEach(function (card, index) {
              if (card.querySelector('.readforge-delete-book-button')) return;
              var title = (card.querySelector('h3') || {}).textContent || 'this book';
              var button = document.createElement('button');
              button.type = 'button';
              button.className = 'readforge-delete-book-button';
              button.textContent = '🗑';
              button.setAttribute('aria-label', 'Remove this book from your library');
              button.title = 'Remove this book from your library';
              button.addEventListener('click', async function (event) {
                event.preventDefault();
                event.stopPropagation();
                if (!confirm('Remove "' + title + '" from your ReadForge library?')) return;
                var library = await window.readforge.getLibrary();
                var books = library.books || [];
                var matchingTitle = String(title || '').trim().toLowerCase();
                var match = books.find(function (b) { return String(b.title || 'Untitled').trim().toLowerCase() === matchingTitle; }) || books[index];
                if (!match) return;
                await window.readforge.saveLibrary(Object.assign({}, library, { books: books.filter(function (b) { return b.id !== match.id; }) }));
                location.reload();
              });
              card.appendChild(button);
            });
          }

          function refreshHelpers() {
            updateVersionBadgeVisibility();
            hideVoiceWindowsUi();
            patchUpdateButtons();
            addDeleteButtons();
          }
          refreshHelpers();
          new MutationObserver(refreshHelpers).observe(document.body, { childList: true, subtree: true, attributes: true });
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
